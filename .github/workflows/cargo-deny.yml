name: Cargo Deny

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: "always"

permissions:
  contents: read

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Cargo deny check
        run: cargo deny check
